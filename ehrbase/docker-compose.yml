#
# Bundled stack: EhrBase + PostgreSQL + Keycloak (optional OAuth testing).
#
# Configure database and auth via .env.ehrbase (see .env.ehrbase.example).
#
#   cp .env.ehrbase.example .env.ehrbase
#   docker compose up -d
#
# External PostgreSQL instead of bundled ehrdb:
#   docker compose -f docker-compose.external-db.yml up -d
#
services:

  ehrbase:
    image: ${EHRBASE_IMAGE:-ehrbase/ehrbase:next}
    env_file:
      - .env.ehrbase
    links:
      - ehrdb
      - keycloak
    depends_on:
      ehrdb:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "${EHRBASE_PORT:-8080}:8080"
    networks:
      - ehrbase-net
    restart: unless-stopped

  ehrdb:
    image: ${EHRBASE_POSTGRES_IMAGE:-ehrbase/ehrbase-v2-postgres:16.2}
    env_file:
      - .env.ehrbase
    environment:
      POSTGRES_USER: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ehrdb-data:/var/lib/postgresql/data
    networks:
      - ehrbase-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: keycloak
    command: "start-dev --import-realm"
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_PORT: 8080
    volumes:
      - ./tests/keycloak/import:/opt/keycloak/data/import
    networks:
      - ehrbase-net

networks:
  ehrbase-net: { }

volumes:
  ehrdb-data: { }
